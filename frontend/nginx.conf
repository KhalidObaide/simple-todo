server {
    listen 80;
    server_name obaid.family www.obaid.family;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name obaid.family www.obaid.family;

    ssl_certificate /etc/letsencrypt/live/obaid.family/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/obaid.family/privkey.pem;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://backend:6001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
